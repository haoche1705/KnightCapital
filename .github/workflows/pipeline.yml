name: Knight Capital Advanced Guard

on: 
  - push
  - pull_request

jobs:
  comprehensive-check:
    runs-on: ubuntu-latest

    steps:
      # B1 — Lấy mã nguồn
      - name: 1. Lấy mã nguồn (Checkout)
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # SonarCloud cần toàn bộ lịch sử commit

      # B2 — Cài đặt Java
      - name: 2. Thiết lập Java JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # LAYER 1 — Quét từ khóa nhanh
      - name: Layer 1 - Custom Script Scan (Fast Fail)
        run: |
          echo "🔍 Đang quét từ khóa nhạy cảm..."
          if grep -r "activatePowerPegMode" src/main/java; then
            echo "❌ CẢNH BÁO: Phát hiện hàm Power Peg cũ! Dừng Pipeline ngay lập tức."
            exit 1
          fi

      # LAYER 2 — Phân tích sâu SonarCloud
      - name: Layer 2 - SonarCloud Analysis (Deep Scan)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=Ten_Project_Cua_Ban

      # BUILD CUỐI — Chỉ chạy nếu các lớp bảo vệ trên PASS
      - name: 3. Đóng gói sản phẩm (Build Artifact)
        run: mvn -B package --file pom.xml
